<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVERFORGE | Premium Fitness Accessories</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f0f0f;
            color:white;
        }

        .hero{
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
            padding:20px;
        }

        img{
            width:140px;
            margin-bottom:30px;
        }

        h1{
            font-size:3.5rem;
            letter-spacing:8px;
            margin-bottom:15px;
        }

        p{
            font-size:1.2rem;
            color:#cfcfcf;
            max-width:600px;
            line-height:1.8;
        }

        .button{
            margin-top:40px;
            text-decoration:none;
            color:white;
            border:1px solid white;
            padding:15px 35px;
            transition:.3s;
        }

        .button:hover{
            background:white;
            color:#0f0f0f;
        }
    </style>

</head>

<body>

<div class="hero">

    <img src="Everforge logo.png" alt="EVERFORGE Logo">

    <h1>EVERFORGE</h1>

    <p>
        Precision engineered.<br>
        Built to perform.
    </p>

    <a class="button" href="mailto:contact@everforgefitness.co.uk">
        Contact Us
    </a>

</div>

</body>
</html>
